<!DOCTYPE html>
<html>
<head>

<title>Simulador de Oferta</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

* { transition: all 0.2s ease; }

body {
    font-family: 'Inter', sans-serif;
    background: #f5f6fa;
    margin: 0;
}

.header {
    background: #1E3A8A;
    color: white;
    padding: 16px;
    text-align: center;
    font-weight: 600;
    font-size: 18px;
}

.container {
    max-width: 500px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.08);
}

h2 {
    margin-bottom: 20px;
    text-align: center;
}

label {
    font-weight: 600;
    font-size: 14px;
}

select {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    margin-bottom: 18px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 16px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: white;
    font-weight: 600;
    font-size: 16px;
}

button:hover {
    background: #333;
    transform: scale(1.02);
}

</style>
</head>

<body>

<div class="header" id="headerEntidad">AAMAS</div>

<div class="container">

<h2>Simular Oferta</h2>

<form id="formulario" method="post" action="/calcular">

<label>Entidad</label>
<select name="entidad" id="entidad">
    <option value="aamas">AAMAS</option>
    <option value="quantum">QUANTUM</option>
</select>

<!-- 🔥 Eliminamos línea completamente -->
<input type="hidden" name="linea" value="haberes">

<label>Repartición</label>
<select name="reparticion" id="reparticion">
    <option value="policia">Policía</option>
    <option value="educacion" selected>Educación</option>
    <option value="spb">SPB</option>
    <option value="ips">IPS</option>
</select>

<div>
    <label>Monto</label>
    <select name="monto">
        {% for i in montos %}
        <option value="{{ i }}">
            $ {{ "{:,}".format(i).replace(",", ".") }}
        </option>
        {% endfor %}
    </select>
</div>

<div>
    <label>Cuotas</label>
    <select name="cuotas">
        <option value="6">6 cuotas</option>
        <option value="12">12 cuotas</option>
        <option value="18">18 cuotas</option>
        <option value="24" selected>24 cuotas</option>
    </select>
</div>

<button type="submit">Calcular Oferta</button>

</form>

</div>

<script>

const entidadSelect = document.getElementById("entidad");
const header = document.getElementById("headerEntidad");
const reparticionSelect = document.getElementById("reparticion");

// Opciones AAMAS
const opcionesAAMAS = `
    <option value="policia">Policía</option>
    <option value="educacion" selected>Educación</option>
    <option value="spb">SPB</option>
    <option value="ips">IPS</option>
`;

// Opciones QUANTUM
const opcionesQuantum = `
    <option value="educacion">Educación</option>
`;

entidadSelect.addEventListener("change", function() {

    const entidad = this.value;

    // 🔵 CAMBIO DE HEADER
    if (entidad === "quantum") {
        header.innerText = "QUANTUM";
        header.style.background = "#2C2C2C";
        header.style.color = "white";

        reparticionSelect.innerHTML = opcionesQuantum;

    } else {
        header.innerText = "AAMAS";
        header.style.background = "#1E3A8A";
        header.style.color = "white";

        reparticionSelect.innerHTML = opcionesAAMAS;
    }

});

// 🔥 IMPORTANTE: ejecutar al cargar
window.onload = function() {
    entidadSelect.dispatchEvent(new Event("change"));
};

</script>

</body>
</html>
