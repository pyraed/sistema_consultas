<!DOCTYPE html>
<html lang="es">
<head>
<title>Sistema de Consultas — Acceso</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1E3A8A;
    --primary-hover: #1e40af;
    --primary-light: #dbeafe;
    --surface: #ffffff;
    --surface-2: #f8fafc;
    --border: #e2e8f0;
    --border-focus: #3b82f6;
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface-2);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    background: var(--primary);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60px;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: white;
    letter-spacing: 0.3px;
    font-family: 'DM Mono', monospace;
  }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* ── LOGO AREA ── */
  .logo-area {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }

  .logo-icon svg {
    width: 32px;
    height: 32px;
    stroke: white;
  }

  .logo-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.4px;
    margin-bottom: 6px;
  }

  .logo-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.3px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    width: 100%;
    max-width: 400px;
    overflow: hidden;
  }

  .card-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
  }

  .card-eyebrow {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    margin-bottom: 4px;
  }

  .card-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  .card-body {
    padding: 24px 28px 28px;
  }

  /* ── FIELD ── */
  .field {
    margin-bottom: 18px;
  }

  .field-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 7px;
    font-family: 'DM Mono', monospace;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-primary);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  input::placeholder { color: var(--text-muted); }
  input:hover { border-color: #94a3b8; }
  input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }

  /* ── ERROR ── */
  .error-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    margin-bottom: 18px;
    font-size: 13px;
    color: #dc2626;
    font-weight: 500;
  }

  .error-banner svg {
    width: 15px;
    height: 15px;
    stroke: #dc2626;
    flex-shrink: 0;
  }

  /* ── BOTÓN ── */
  .btn-login {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--primary);
    color: white;
    font-weight: 600;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.15s;
    margin-top: 8px;
  }

  .btn-login:hover {
    background: var(--primary-hover);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(30,58,138,0.2);
  }

  .btn-login:active { transform: translateY(0); }

  .btn-login svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>

<body>

<header class="header">
  <span class="header-title">SISTEMA DE CONSULTAS · AAMAS / QUANTUM</span>
</header>

<main class="main">

  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1 class="logo-title">Sistema de Gestión Mutual</h1>
    <p class="logo-subtitle">acceso restringido · solo personal autorizado</p>
  </div>

  <div class="card">
    <div class="card-header">
      <p class="card-eyebrow">Autenticación</p>
      <h2 class="card-title">Iniciar sesión</h2>
    </div>

    <div class="card-body">

      {% if error %}
      <div class="error-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login">

        <div class="field">
          <label class="field-label" for="usuario">Usuario</label>
          <input
            type="text"
            name="usuario"
            id="usuario"
            placeholder="Ingresá tu usuario"
            autocomplete="username"
            required
          >
        </div>

        <div class="field">
          <label class="field-label" for="password">Contraseña</label>
          <input
            type="password"
            name="password"
            id="password"
            placeholder="Ingresá tu contraseña"
            autocomplete="current-password"
            required
          >
        </div>

        <button type="submit" class="btn-login">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Ingresar
        </button>

      </form>
    </div>
  </div>

</main>

<footer class="footer">
  v1.0 &nbsp;·&nbsp; sistema de gestión mutual
</footer>

</body>
</html>
