<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validación de Identidad</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>Validación de Identidad</h2>

<form method="POST" action="/guardar_formulario" enctype="multipart/form-data">

<!-- 🔥 reenviar TODOS los datos -->
{% for key, value in request.form.items() %}
<input type="hidden" name="{{ key }}" value="{{ value }}">
{% endfor %}

<label>DNI Frente</label>
<input type="file" name="dni_frente" accept="image/*" capture="environment" required>

<label>DNI Dorso</label>
<input type="file" name="dni_dorso" accept="image/*" capture="environment" required>

<label>Selfie con DNI</label>
<input type="file" name="selfie" accept="image/*" capture="user" required>

<br><br>
<button type="submit">Continuar</button>

</form>

</body>
</html>
