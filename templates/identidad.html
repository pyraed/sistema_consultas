<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validación de Identidad</title>

<style>
body {
    font-family: Arial;
    background: #f5f6fa;
    padding: 30px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 10px;
    max-width: 600px;
    margin: auto;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.section {
    margin-bottom: 20px;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

input[type="file"] {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fafafa;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #0A3D91;
    color: white;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #082c6b;
}

.info {
    font-size: 14px;
    color: #555;
    margin-bottom: 15px;
}

.camera-box {
    position: relative;
    width: 100%;
    height: 200px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px dashed #0A3D91;
    margin-bottom: 10px;
    background: #f9f9f9;
}

.overlay {
    position: absolute;
    top: 20px;
    left: 10%;
    width: 80%;
    height: 60%;
    border: 2px solid #0A3D91;
    border-radius: 8px;
    pointer-events: none;
}

.camera-box input {
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="card">

<h2>Validación de Identidad</h2>

<p class="info">
Por favor tomá fotos claras de tu DNI y una selfie sosteniendo el documento.
</p>

<form method="POST" action="/guardar_formulario" enctype="multipart/form-data">

<!-- 🔥 REENVÍA TODOS LOS DATOS -->
{% for key, value in request.form.items() %}
<input type="hidden" name="{{ key }}" value="{{ value }}">
{% endfor %}

<div class="section">
<label>DNI Frente</label>

<div class="camera-box">
    <div class="overlay"></div>
    <input type="file" name="dni_frente" accept="image/*" capture="environment" required>
</div>

<img id="previewFrente" style="width:100%; margin-top:10px; border-radius:8px; display:none;">
</div>

<div class="section">
<label>DNI Dorso</label>
<input type="file" name="dni_dorso" accept="image/*" capture="environment" required>
</div>

<div class="section">
<label>Selfie con DNI</label>
<input type="file" name="selfie" accept="image/*" capture="user" required>
</div>

<br>

<button type="submit">Continuar</button>

</form>

</div>

<script>
document.querySelector('input[name="dni_frente"]').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(ev){
            const img = document.getElementById("previewFrente");
            img.src = ev.target.result;
            img.style.display = "block";
        }
        reader.readAsDataURL(file);
    }
});
</script>

</body>
</html>
